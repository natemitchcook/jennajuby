{{ define "main" }}

  <div class="mw6 center ph3 pv4">
    <h1 class="f2 lh-title b mb3">{{.Title}}</h1>
    <div class="flex justify-between grey-3">
      <p>{{ .Date.Format "Mon, Jan 2, 2006" }}</p>
    </div>
    <div class="cms mw6">
      {{ if .Params.image }}<img src="{{ .Params.image }}" alt="{{ .Title }}" loading="lazy" />{{ end }}

        {{ .Content }}

        {{ partial "image-grid" .Params.gallery }}

    </div>
  </div>
<script>
document.body.addEventListener('click', function(e) {
  var link = e.target.closest('a');
  if (link && link.hostname !== window.location.hostname) {
    link.target = '_blank';
    link.rel = 'noopener noreferrer';
  }
});
</script>
{{ end }}
