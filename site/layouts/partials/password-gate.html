<style>
  .site-content { display: none; }
  .site-content.authenticated { display: block; }
</style>
<div id="password-gate" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:99999; font-family:'Open Sans',sans-serif;">
  <div style="max-width:400px; margin:20vh auto; padding:2rem; text-align:center;">
    <h2 style="font-family:'Playfair Display',serif; font-size:1.8rem; margin-bottom:1.5rem; color:#333;">This site is private</h2>
    <p style="color:#666; margin-bottom:1.5rem; font-size:0.9rem;">Enter the password to continue.</p>
    <form id="password-form" style="display:flex; flex-direction:column; gap:0.75rem;">
      <input type="password" id="password-input" placeholder="Password" autocomplete="off"
        style="padding:0.75rem 1rem; border:1px solid #ddd; border-radius:4px; font-size:1rem; outline:none; transition:border-color 0.2s;"
        onfocus="this.style.borderColor='#333'" onblur="this.style.borderColor='#ddd'">
      <button type="submit"
        style="padding:0.75rem 1rem; background:#333; color:#fff; border:none; border-radius:4px; font-size:1rem; cursor:pointer; transition:background 0.2s;"
        onmouseover="this.style.background='#555'" onmouseout="this.style.background='#333'">Enter</button>
      <p id="password-error" style="color:#c0392b; font-size:0.85rem; margin:0; display:none;">Incorrect password. Try again.</p>
    </form>
  </div>
</div>
<script>
(function() {
  var HASH = "14ab61241458433a536e8dc50ea2967977da0b934cfc3603d5450c5389505009";
  var STORAGE_KEY = "jj_auth";

  async function sha256(message) {
    var msgBuffer = new TextEncoder().encode(message);
    var hashBuffer = await crypto.subtle.digest("SHA-256", msgBuffer);
    var hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(function(b) { return b.toString(16).padStart(2, "0"); }).join("");
  }

  function unlock() {
    document.getElementById("password-gate").style.display = "none";
    var content = document.querySelector(".site-content");
    if (content) content.classList.add("authenticated");
  }

  function checkAuth() {
    var stored = sessionStorage.getItem(STORAGE_KEY);
    if (stored === HASH) {
      unlock();
    } else {
      document.getElementById("password-input").focus();
    }
  }

  document.getElementById("password-form").addEventListener("submit", async function(e) {
    e.preventDefault();
    var input = document.getElementById("password-input").value;
    var hashed = await sha256(input);
    if (hashed === HASH) {
      sessionStorage.setItem(STORAGE_KEY, HASH);
      unlock();
    } else {
      document.getElementById("password-error").style.display = "block";
      document.getElementById("password-input").value = "";
      document.getElementById("password-input").focus();
    }
  });

  checkAuth();
})();
</script>
