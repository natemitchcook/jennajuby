<!-- Contact -->
<div class="mb4 pt4">
  <h4 class="f3 b lh-title mb3 tc">I’d love to hear from you!</h4>

  <form name="contact-form" method="POST" netlify-honeypot="bot-field" action="/thanks.html" data-netlify="true" data-netlify-recaptcha="true">
    <p style="display:none;">
      <label>Don’t fill this out: <input name="bot-field"></label>
    </p>
    <div class="flex-l mhn1-l">
          <!-- Name -->
      <div class="ph1-l w-50-l">
        <fieldset>
          <input name="name" type="text" id="name" placeholder="Name" class="w-100 mb2">
          <label for="name">Name</label>
        </fieldset>
      </div>
          <!-- Email -->
      <div class="ph1-l w-50-l">
        <fieldset>
          <input name="email" type="email" id="email" placeholder="Email" class="w-100 mb2">
          <label for="email">Email</label>
        </fieldset>
      </div>
    </div>

        <!-- Message -->
    <fieldset>
      <textarea name="message" placeholder="Your message" rows="8" cols="80" id="message" class="w-100"></textarea>
      <label for="message">Your message</label>
    </fieldset>
        <!-- Button -->
    <div class="tc">
      <button type="submit" class="btn w-100 w-auto-ns raise">Submit</button>
    </div>
  </form>
</div>
